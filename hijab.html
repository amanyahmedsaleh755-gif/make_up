<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hijab Style Guide</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #fcfaf9; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }

        h2 { 
            color: #8d5555; 
            margin-top: 30px; 
            font-size: 1.5rem;
        }

        /* حاوية الأزرار */
        .skin-selector { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin: 40px 0; 
            flex-wrap: wrap;
        }

        .skin-option { 
            cursor: pointer; 
            text-align: center; 
            transition: 0.3s;
        }

        .skin-circle { 
            width: 75px; 
            height: 75px; 
            border-radius: 50%; 
            border: 4px solid white; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            margin-bottom: 10px;
        }

        /* ألوان الدوائر */
        .white-skin { background-color: #ffdbac; }
        .wheat-skin { background-color: #e8beac; }
        .dark-skin { background-color: #ac7e6c; }

        .skin-option:hover { transform: translateY(-5px); }
        .skin-option:hover .skin-circle { border-color: #b56b6b; }

        /* منطقة عرض الصور */
        .gallery { 
            display: none; 
            max-width: 500px; 
            margin: 0 auto; 
            padding: 20px;
            animation: fadeIn 0.6s ease-in-out;
        }

        .gallery img { 
            width: 100%; 
            height: auto; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-link { 
            display: inline-block; 
            margin-top: 20px; 
            color: #b56b6b; 
            text-decoration: none; 
            font-size: 0.9rem;
            border-bottom: 1px solid transparent;
        }
        .back-link:hover { border-bottom-color: #b56b6b; }
    </style>
</head>
<body>

    <h2>اختاري لون بشرتك لاختيار درجات الحجاب المناسبة</h2>

    <div class="skin-selector">
        <div class="skin-option" onclick="showSkin('white')">
            <div class="skin-circle white-skin"></div>
            <span>بشرة بيضاء</span>
        </div>
        <div class="skin-option" onclick="showSkin('wheat')">
            <div class="skin-circle wheat-skin"></div>
            <span>بشرة حنطية</span>
        </div>
        <div class="skin-option" onclick="showSkin('dark')">
            <div class="skin-option-inner" onclick="showSkin('dark')">
                <div class="skin-circle dark-skin"></div>
                <span>بشرة سمراء</span>
            </div>
        </div>
    </div>

    <div id="white" class="gallery">
        <img src="https://i.postimg.cc/26V4HBx9/Screenshot-20260425-010334-com-google-android-googlequicksearchbox-Lens-Exported-Act-edit-1035886284.jpg" alt="درجات الحجاب للبشرة البيضاء">
    </div>

    <div id="wheat" class="gallery">
        <img src="https://i.postimg.cc/KzwtCvqj/Screenshot-20260425-010345-com-google-android-googlequicksearchbox-Lens-Exported-Act-edit-1035906795.jpg" alt="درجات الحجاب للبشرة الحنطية">
    </div>

    <div id="dark" class="gallery">
        <img src="https://i.postimg.cc/6ptnkP0k/Screenshot-20260424-230502-com-google-android-googlequicksearchbox-Google-App-Activi-edit-1030505747.jpg" alt="درجات الحجاب للبشرة السمراء">
    </div>

    <br>
    <a href="index.html" class="back-link">← العودة للصفحة الرئيسية</a>

    <script>
        function showSkin(id) {
            // إخفاء أي جاليري مفتوح
            document.querySelectorAll('.gallery').forEach(el => el.classList.remove('active'));
            // إظهار الجاليري المطلوب
            const target = document.getElementById(id);
            if(target) {
                target.classList.add('active');
            }
        }
    </script>
</body>
</html>
